<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Parli Aspo Dictionary</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Baloo+2:wght@700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0F1A1F;
  --bg2: #162229;
  --card: #1C2F38;
  --card-hover: #22394A;
  --green: #58CC02;
  --green-dark: #46A302;
  --green-glow: rgba(88,204,2,0.18);
  --red: #FF4B4B;
  --gold: #FFC800;
  --gold-glow: rgba(255,200,0,0.15);
  --blue: #1CB0F6;
  --blue-glow: rgba(28,176,246,0.12);
  --purple: #CE82FF;
  --purple-glow: rgba(206,130,255,0.12);
  --text: #FFFFFF;
  --dim: #7A99A8;
  --mid: #A3BCC9;
  --border: #263A45;
  --input: #0B151B;
  --radius: 16px;
  --font: 'Nunito', system-ui, sans-serif;
  --display: 'Baloo 2', 'Nunito', system-ui, sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html { background: var(--bg); }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  min-height: 100dvh;
  overflow-x: hidden;
}

@keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
@keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
@keyframes pulseGlow { 0%,100% { box-shadow: 0 0 20px var(--green-glow); } 50% { box-shadow: 0 0 40px var(--green-glow), 0 0 60px rgba(88,204,2,0.08); } }
@keyframes slideResult { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

/* Header */
.header {
  padding: 16px 20px;
  border-bottom: 1.5px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  position: sticky;
  top: 0;
  background: var(--bg);
  z-index: 100;
}
.header-icon { font-size: 26px; animation: float 3s ease-in-out infinite; }
.header-title { font-family: var(--display); color: var(--green); font-weight: 800; font-size: 22px; }
.header-sub { color: var(--dim); font-size: 13px; font-weight: 600; margin-left: 4px; }

/* Main */
.main {
  max-width: 640px;
  margin: 0 auto;
  padding: 20px 16px 60px;
}

/* Translator panels */
.panel {
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 16px;
  transition: border-color 0.3s, box-shadow 0.3s;
}
.panel:focus-within {
  border-color: var(--green);
  box-shadow: 0 0 24px var(--green-glow);
}
.panel.pa-panel:focus-within {
  border-color: var(--blue);
  box-shadow: 0 0 24px var(--blue-glow);
}

.panel-label {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 12px;
}
.panel-flag {
  width: 28px;
  height: 28px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 15px;
  font-weight: 800;
  flex-shrink: 0;
}
.flag-en { background: rgba(28,176,246,0.15); border: 1.5px solid var(--blue); color: var(--blue); }
.flag-pa { background: var(--green-glow); border: 1.5px solid var(--green); color: var(--green); }
.panel-lang { font-size: 15px; font-weight: 800; color: var(--mid); }

.search-input {
  width: 100%;
  padding: 14px 16px;
  padding-right: 44px;
  background: var(--input);
  border: 2px solid var(--border);
  border-radius: 12px;
  color: var(--text);
  font-family: var(--font);
  font-size: 17px;
  font-weight: 700;
  outline: none;
  transition: border-color 0.2s;
}
.search-input::placeholder { color: var(--dim); font-weight: 600; }
.search-input:focus { border-color: var(--green); }
.pa-panel .search-input:focus { border-color: var(--blue); }

.input-wrap {
  position: relative;
}
.clear-btn {
  position: absolute;
  right: 10px;
  top: 50%;
  transform: translateY(-50%);
  background: var(--border);
  border: none;
  color: var(--dim);
  width: 28px;
  height: 28px;
  border-radius: 50%;
  font-size: 14px;
  font-weight: 800;
  cursor: pointer;
  display: none;
  align-items: center;
  justify-content: center;
  transition: background 0.15s;
  font-family: var(--font);
}
.clear-btn.visible { display: flex; }
.clear-btn:hover { background: var(--card-hover); color: var(--text); }

/* Results */
.results {
  margin-top: 14px;
}

.result-item {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 12px 14px;
  background: var(--bg2);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  margin-bottom: 8px;
  animation: slideResult 0.25s ease-out both;
  transition: border-color 0.15s, background 0.15s;
  cursor: default;
}
.result-item:hover {
  border-color: rgba(255,255,255,0.1);
  background: var(--card-hover);
}

.result-word {
  font-size: 17px;
  font-weight: 800;
  color: var(--text);
  line-height: 1.3;
}
.result-translation {
  font-size: 14px;
  font-weight: 600;
  color: var(--dim);
  margin-top: 2px;
  line-height: 1.4;
}
.result-pos {
  display: inline-block;
  font-size: 11px;
  font-weight: 800;
  color: var(--purple);
  background: var(--purple-glow);
  border: 1px solid rgba(206,130,255,0.25);
  padding: 2px 8px;
  border-radius: 6px;
  margin-top: 4px;
  text-transform: uppercase;
  letter-spacing: 0.4px;
}
.result-note {
  font-size: 12px;
  font-weight: 600;
  color: var(--blue);
  font-style: italic;
  margin-top: 3px;
}

.result-arrow {
  color: var(--green);
  font-size: 18px;
  font-weight: 800;
  flex-shrink: 0;
  margin-top: 2px;
  opacity: 0.6;
}
.pa-panel .result-arrow { color: var(--blue); }

.no-results {
  text-align: center;
  padding: 20px;
  color: var(--dim);
  font-size: 14px;
  font-weight: 600;
}
.no-results-icon { font-size: 28px; margin-bottom: 8px; }

/* Divider */
.divider {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  margin: 4px 0;
  color: var(--dim);
}
.divider-line { flex: 1; height: 1px; background: var(--border); }
.divider-icon {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: var(--card);
  border: 2px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
}

/* Stats bar */
.stats-bar {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
  flex-wrap: wrap;
  justify-content: center;
}
.stat-chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  border-radius: 99px;
  padding: 6px 14px;
  font-size: 13px;
  font-weight: 800;
  background: rgba(255,200,0,0.08);
  border: 1.5px solid rgba(255,200,0,0.25);
  color: var(--gold);
}
.stat-chip.blue {
  background: var(--blue-glow);
  border-color: rgba(28,176,246,0.25);
  color: var(--blue);
}
.stat-chip.green {
  background: var(--green-glow);
  border-color: rgba(88,204,2,0.25);
  color: var(--green);
}

/* Browse section */
.browse-section {
  margin-top: 28px;
}
.browse-title {
  font-size: 18px;
  font-weight: 800;
  color: var(--mid);
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.letter-nav {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 16px;
}
.letter-btn {
  width: 36px;
  height: 36px;
  border-radius: 10px;
  background: var(--card);
  border: 1.5px solid var(--border);
  color: var(--mid);
  font-size: 14px;
  font-weight: 800;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font);
}
.letter-btn:hover { background: var(--card-hover); color: var(--text); }
.letter-btn.active {
  background: var(--green-glow);
  border-color: var(--green);
  color: var(--green);
}
.letter-btn.disabled {
  opacity: 0.25;
  cursor: default;
}

.browse-results {
  max-height: 420px;
  overflow-y: auto;
  padding-right: 4px;
}
.browse-results::-webkit-scrollbar { width: 5px; }
.browse-results::-webkit-scrollbar-track { background: transparent; }
.browse-results::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

/* Grammar tip */
.grammar-tip {
  background: linear-gradient(135deg, rgba(88,204,2,0.06), rgba(28,176,246,0.06));
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 18px;
  margin-top: 20px;
}
.grammar-tip-title {
  font-size: 14px;
  font-weight: 800;
  color: var(--green);
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.grammar-tip-text {
  font-size: 13px;
  font-weight: 600;
  color: var(--mid);
  line-height: 1.6;
}
.grammar-tip-text strong { color: var(--text); }

/* Result count */
.result-count {
  font-size: 12px;
  font-weight: 700;
  color: var(--dim);
  margin-bottom: 8px;
  padding-left: 2px;
}

/* Responsive */
@media (max-width: 480px) {
  .main { padding: 14px 12px 60px; }
  .panel { padding: 16px; }
  .search-input { font-size: 16px; padding: 12px 14px; padding-right: 40px; }
}
</style>
</head>

// Deduplicate by pa word
const seen = new Set();
const DICTIONARY = DICT.filter(entry => {
  if (seen.has(entry.pa)) return false;
  seen.add(entry.pa);
  return true;
}).sort((a, b) => a.pa.localeCompare(b.pa));

// ═══════════════════════════════════════════════════════════════
// SEARCH FUNCTIONS
// ═══════════════════════════════════════════════════════════════
function searchEnToPA(query) {
  const q = query.toLowerCase().trim();
  if (!q) return [];
  
  const exact = [];
  const startsWith = [];
  const contains = [];
  
  DICTIONARY.forEach(entry => {
    const meanings = entry.en.toLowerCase().split(/\s*\/\s*|\s*\(\s*|\s*\)\s*/).filter(Boolean);
    const enLower = entry.en.toLowerCase();
    
    // Exact match on any meaning
    if (meanings.some(m => m.trim() === q)) {
      exact.push(entry);
    }
    // Starts with query
    else if (meanings.some(m => m.trim().startsWith(q)) || enLower.startsWith(q)) {
      startsWith.push(entry);
    }
    // Contains query
    else if (enLower.includes(q)) {
      contains.push(entry);
    }
  });
  
  return [...exact, ...startsWith, ...contains];
}

function searchPAToEn(query) {
  const q = query.toLowerCase().trim();
  if (!q) return [];
  
  const exact = [];
  const startsWith = [];
  const contains = [];
  
  DICTIONARY.forEach(entry => {
    const paLower = entry.pa.toLowerCase();
    
    if (paLower === q) {
      exact.push(entry);
    } else if (paLower.startsWith(q)) {
      startsWith.push(entry);
    } else if (paLower.includes(q)) {
      contains.push(entry);
    }
  });
  
  return [...exact, ...startsWith, ...contains];
}

// RENDER
// ═══════════════════════════════════════════════════════════════
const appEl = document.getElementById("app");

let enQuery = "";
let paQuery = "";
let browseLetter = "";

function renderResultItem(entry, direction) {
  const word = direction === "en" ? entry.pa : entry.en;
  const trans = direction === "en" ? entry.en : entry.pa;
  const arrow = direction === "en" ? "→" : "←";
  
  let noteHTML = "";
  if (entry.note) {
    noteHTML = `<div class="result-note">🧩 ${entry.note}</div>`;
  }
  
  return `<div class="result-item">
    <span class="result-arrow">${arrow}</span>
    <div style="flex:1;min-width:0">
      <div class="result-word">${word}</div>
      <div class="result-translation">${trans}</div>
      <span class="result-pos">${entry.pos}</span>
      ${noteHTML}
    </div>
  </div>`;
}

function render() {
  const enResults = searchEnToPA(enQuery);
  const paResults = searchPAToEn(paQuery);
  
  let enResultsHTML = "";
  if (enQuery.trim()) {
    if (enResults.length > 0) {
      enResultsHTML = `<div class="result-count">${enResults.length} result${enResults.length !== 1 ? "s" : ""}</div>`;
      enResultsHTML += enResults.slice(0, 30).map(e => renderResultItem(e, "en")).join("");
      if (enResults.length > 30) enResultsHTML += `<div class="result-count" style="text-align:center;padding:12px">...and ${enResults.length - 30} more</div>`;
    } else {
      enResultsHTML = `<div class="no-results"><div class="no-results-icon">🤔</div>No results for "${enQuery}"</div>`;
    }
  }
  
  let paResultsHTML = "";
  if (paQuery.trim()) {
    if (paResults.length > 0) {
      paResultsHTML = `<div class="result-count">${paResults.length} result${paResults.length !== 1 ? "s" : ""}</div>`;
      paResultsHTML += paResults.slice(0, 30).map(e => renderResultItem(e, "pa")).join("");
      if (paResults.length > 30) paResultsHTML += `<div class="result-count" style="text-align:center;padding:12px">...and ${paResults.length - 30} more</div>`;
    } else {
      paResultsHTML = `<div class="no-results"><div class="no-results-icon">🤔</div>No results for "${paQuery}"</div>`;
    }
  }
  
  // Browse by letter
  const letters = "ABDEFGHIKLMNOPRSTUVWY".split("");
  const paLetters = new Set(DICTIONARY.map(e => e.pa[0].toUpperCase()));
  
  let browseHTML = "";
  if (browseLetter) {
    const browseResults = DICTIONARY.filter(e => e.pa[0].toUpperCase() === browseLetter);
    browseHTML = `<div class="browse-results">${browseResults.map(e => renderResultItem(e, "pa")).join("")}</div>`;
  }
  
  const grammarTips = [
    { title: "Nouns end in -o", text: "All nouns end in <strong>-o</strong>. Plurals add <strong>-s</strong>: libo → libos (books)" },
    { title: "Verbs end in -i", text: "Infinitive/present tense ends in <strong>-i</strong>. Past: <strong>pa</strong> + verb. Future: <strong>fu</strong> + verb." },
    { title: "Adjectives end in -a", text: "Both adjectives and adverbs end in <strong>-a</strong>. Adjectives precede nouns: bela kaso (beautiful house)" },
    { title: "mal- = opposite", text: "Add <strong>mal-</strong> to create opposites: bela (beautiful) → malbela (ugly), veni (come) → malveni (leave)" },
    { title: "re- = again", text: "Add <strong>re-</strong> to verbs for repetition: legi (read) → relegi (reread), pensi (think) → repensi (remember)" },
    { title: "-ido = smaller version", text: "The suffix <strong>-ido</strong> makes diminutives: pipo (dog) → pipido (puppy), fogo (fire) → fogido (flame)" },
    { title: "-io = doer/agent", text: "The suffix <strong>-io</strong> creates agent nouns: kanti (sing) → kantio (singer), labori (work) → laborio (worker)" },
    { title: "Compound words", text: "Combine words to make new ones: pano (bread) + tendo (store) = <strong>panotendo</strong> (bakery)" },
  ];
  const tip = grammarTips[Math.floor(Date.now() / 60000) % grammarTips.length];
  
  appEl.innerHTML = `
    <div class="stats-bar">
      <span class="stat-chip">📖 ${DICTIONARY.length} words</span>
      <span class="stat-chip blue">🔤 Bidirectional</span>
      <span class="stat-chip green">⚡ Instant search</span>
    </div>
    
    <!-- English → Parli Aspo -->
    <div class="panel">
      <div class="panel-label">
        <div class="panel-flag flag-en">EN</div>
        <span class="panel-lang">English → Parli Aspo</span>
      </div>
      <div class="input-wrap">
        <input class="search-input" id="enInput" type="text" placeholder="Type an English word..."
          value="${enQuery}" autocomplete="off" autocapitalize="off" spellcheck="false">
        <button class="clear-btn ${enQuery ? 'visible' : ''}" id="enClear">✕</button>
      </div>
      <div class="results" id="enResults">${enResultsHTML}</div>
    </div>
    
    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-icon">⇅</div>
      <div class="divider-line"></div>
    </div>
    
    <!-- Parli Aspo → English -->
    <div class="panel pa-panel">
      <div class="panel-label">
        <div class="panel-flag flag-pa">PA</div>
        <span class="panel-lang">Parli Aspo → English</span>
      </div>
      <div class="input-wrap">
        <input class="search-input" id="paInput" type="text" placeholder="Topi parlo de Parli Aspo..."
          value="${paQuery}" autocomplete="off" autocapitalize="off" spellcheck="false">
        <button class="clear-btn ${paQuery ? 'visible' : ''}" id="paClear">✕</button>
      </div>
      <div class="results" id="paResults">${paResultsHTML}</div>
    </div>
    
    <!-- Grammar tip -->
    <div class="grammar-tip">
      <div class="grammar-tip-title">💡 ${tip.title}</div>
      <div class="grammar-tip-text">${tip.text}</div>
    </div>
    
    <!-- Browse -->
    <div class="browse-section">
      <div class="browse-title">📚 Browse by letter</div>
      <div class="letter-nav">
        ${letters.map(l => {
          const has = paLetters.has(l);
          const active = browseLetter === l;
          return `<button class="letter-btn ${active ? 'active' : ''} ${!has ? 'disabled' : ''}"
            data-letter="${l}" ${!has ? 'disabled' : ''}>${l}</button>`;
        }).join("")}
      </div>
      ${browseHTML}
    </div>
  `;
  
  // Bind events
  const enInput = document.getElementById("enInput");
  const paInput = document.getElementById("paInput");
  
  enInput.addEventListener("input", e => {
    enQuery = e.target.value;
    render();
    // Restore cursor
    const el = document.getElementById("enInput");
    el.focus();
    el.setSelectionRange(e.target.selectionStart, e.target.selectionEnd);
  });
  
  paInput.addEventListener("input", e => {
    paQuery = e.target.value;
    render();
    const el = document.getElementById("paInput");
    el.focus();
    el.setSelectionRange(e.target.selectionStart, e.target.selectionEnd);
  });
  
  document.getElementById("enClear").addEventListener("click", () => {
    enQuery = "";
    render();
    document.getElementById("enInput").focus();
  });
  
  document.getElementById("paClear").addEventListener("click", () => {
    paQuery = "";
    render();
    document.getElementById("paInput").focus();
  });
  
  document.querySelectorAll(".letter-btn:not(.disabled)").forEach(btn => {
    btn.addEventListener("click", () => {
      const l = btn.dataset.letter;
      browseLetter = browseLetter === l ? "" : l;
      render();
    });
  });
}

render();
</script>
